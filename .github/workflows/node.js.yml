name: Node.js CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check syntax
      run: |
        node -c server.js
        node -c public/app.js

    - name: Test server startup
      run: |
        timeout 5 node server.js &
        SERVER_PID=$!
        sleep 2
        curl -s -o /dev/null -w "HTTP %{http_code}\n" http://127.0.0.1:8080/ || echo "Server check done"
        kill $SERVER_PID 2>/dev/null || true

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --omit=dev

    - name: Deploy to production
      env:
        PORT: ${{ secrets.PORT || '8080' }}
        NODE_ENV: production
      run: |
        echo "Ready to deploy. Configure your deployment target below."
        echo ""
        echo "Option A - Deploy via SSH:"
        echo "  rsync -avz --exclude node_modules ./ user@host:/path/to/app"
        echo "  ssh user@host 'cd /path/to/app && npm ci --omit=dev && pm2 restart server.js --name kards-updater'"
        echo ""
        echo "Option B - Docker:"
        echo "  docker build -t kards-updater ."
        echo "  docker run -d -p 8080:8080 kards-updater"
        echo ""
        echo "Option C - Fly.io / Railway / Render:"
        echo "  Set start command: node server.js"
        echo "  Set PORT env var accordingly"
